<!-- @dsCard group="Components" viewport="700x520" name="Bracket — match, pick, leaderboard, hero" subtitle="Bracket-specific primitives" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--paper); font-family: var(--font-body); color: var(--ink); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 currentColor; } 70% { box-shadow: 0 0 0 6px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  .lbl { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--ink-3); margin: 16px 0 8px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .grid { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.BracketeerFIFA26DesignSystem_1ca788;
  const { PoolHero, MatchCard, PickSelector, LeaderboardRow, GroupChip, Button } = NS;
  const { useState } = React;

  function Demo() {
    const [pick, setPick] = useState("BRA");
    return (
      <div>
        <div className="lbl" style={{ marginTop: 0 }}>Group chips A–L</div>
        <div className="row">
          {["A","B","C","D","E","F","G","H","I","J","K","L"].map(g => <GroupChip key={g} group={g} />)}
        </div>

        <div className="lbl">Match card · live + final</div>
        <div className="grid">
          <MatchCard
            matchNo={73} round="R32" kickoff="Sat Jun 27 · 15:00 ET"
            status="live" minute={67} accent="city-philadelphia"
            home={{ name: "Brazil", code: "BRA", score: 2, flag: "🇧🇷" }}
            away={{ name: "Croatia", code: "CRO", score: 1, flag: "🇭🇷" }}
            pickedCode="BRA"
          />
          <MatchCard
            matchNo={89} round="R16" kickoff="Sat Jul 4 · 19:00 ET"
            status="final" accent="city-los-angeles"
            home={{ name: "France", code: "FRA", score: 3, flag: "🇫🇷" }}
            away={{ name: "Senegal", code: "SEN", score: 1, flag: "🇸🇳" }}
            winnerCode="FRA" pickedCode="FRA" pointsEarned={2}
          />
        </div>

        <div className="lbl">Pick selector — single-tap</div>
        <PickSelector
          caption="Round of 32 · M73"
          title="Who wins?"
          kickoff="Sat Jun 27 · 15:00 ET"
          value={pick} onPick={setPick}
          options={[
            { code: "BRA", name: "Brazil", flag: "🇧🇷" },
            { code: "ARG", name: "Argentina", flag: "🇦🇷" },
          ]}
        />

        <div className="lbl">Leaderboard rows</div>
        <div style={{ display: "grid", gap: 8 }}>
          <LeaderboardRow
            rank={1} label="Dom" initials="DM" avatarColor="city-houston"
            total={84} projected={3} isLeader
            breakdown={[{label:"Groups",value:36},{label:"R32",value:12},{label:"R16",value:16},{label:"QF",value:9}]}
          />
          <LeaderboardRow
            rank={2} label="Sam Williams" initials="SW" avatarColor="city-philadelphia"
            total={81} isYou
            breakdown={[{label:"Groups",value:34},{label:"R32",value:11},{label:"R16",value:14}]}
          />
        </div>

        <div className="lbl">Pool hero</div>
        <PoolHero
          eyebrow="FIFA World Cup 2026"
          title="Dom's pool"
          subtitle="48 teams · 104 matches · 12 entries"
          status="live"
          pattern
          metric={{ label: "Join code", value: "FIXTUR" }}
          actions={<><Button variant="gold">Make a pick</Button><Button variant="ghost">Share invite</Button></>}
        />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
