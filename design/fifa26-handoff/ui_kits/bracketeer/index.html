<!-- @dsCard group="Bracketeer" viewport="480x900" subtitle="Landing → Pool → Picks interactive flow" -->
<!-- @startingPoint section="App" subtitle="Bracketeer pool view — leaderboard, bracket, chat" viewport="480x900" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Bracketeer — Pool view</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="tree-data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="tree-components.jsx"></script>
<script type="text/babel" src="Landing.jsx"></script>
<script type="text/babel" src="Pool.jsx"></script>
<script type="text/babel" src="Picks.jsx"></script>
<script type="text/babel" src="Desktop.jsx"></script>
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); }
  * { box-sizing: border-box; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 currentColor; }
    70%  { box-shadow: 0 0 0 6px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  ::selection { background: var(--gold); color: var(--pitch-deep); }
</style>
</head>
<body data-screen-label="Bracketeer app">
<div id="root"></div>
<script type="text/babel">
  function App() {
    const [screen, setScreen] = React.useState("pool"); // landing | pool | desktop
    const [picksOpen, setPicksOpen] = React.useState(false);
    const [code, setCode] = React.useState("FIXTUR");

    return (
      <React.Fragment>
        {screen === "landing" ? (
          <div data-screen-label="Landing">
            <Landing onOpenPool={(c) => { setCode(c); setScreen("pool"); }} />
          </div>
        ) : null}
        {screen === "pool" ? (
          <div data-screen-label="Pool">
            <Pool
              poolCode={code}
              onMakePick={() => setPicksOpen(true)}
              onSignOut={() => setScreen("landing")}
              onOpenDesktop={() => setScreen("desktop")}
            />
          </div>
        ) : null}
        {screen === "desktop" ? (
          <div data-screen-label="Desktop bracket">
            <Desktop onBack={() => setScreen("pool")} />
          </div>
        ) : null}
        {picksOpen ? (
          <div data-screen-label="Picks wizard">
            <Picks onClose={() => setPicksOpen(false)} />
          </div>
        ) : null}
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
