<!-- @dsCard group="Type" viewport="700x140" name="Mono — JetBrains Mono" subtitle="Scores, join codes, timestamps" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); color: var(--ink); font-family: var(--font-body); }
  .stack { display: grid; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--ink-3); width: 90px; }
  .m { font: var(--type-mono); font-size: 17px; }
  .big { font-family: var(--font-mono); font-weight: 700; font-size: 28px; letter-spacing: 0.1em; color: var(--pitch); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="label">Join code</span><span class="big">FIXTUR</span></div>
    <div class="row"><span class="label">Score</span><span class="m">73·1 · 19:00 ET</span></div>
    <div class="row"><span class="label">Stamp</span><span class="m">2026-06-11 · KO 12:00 EDT</span></div>
  </div>
</body>
</html>
