<!-- @dsCard group="Spacing" viewport="700x140" name="Radius scale" subtitle="xs → pill (chips/buttons)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); font-family: var(--font-body); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 64px; height: 64px; background: var(--pitch-tint); border: 2px solid var(--pitch); }
  .lbl { font: var(--type-caption); color: var(--ink-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius: var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-md)"></div><span class="lbl">md · 12</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-lg)"></div><span class="lbl">lg · 16</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-xl)"></div><span class="lbl">xl · 20</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-2xl)"></div><span class="lbl">2xl · 24</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-3xl)"></div><span class="lbl">3xl · 32</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-pill)"></div><span class="lbl">pill</span></div>
  </div>
</body>
</html>
