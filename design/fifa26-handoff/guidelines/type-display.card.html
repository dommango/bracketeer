<!-- @dsCard group="Type" viewport="700x180" name="Display — Archivo Black" subtitle="Scores, team codes, headlines" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); color: var(--ink); font-family: var(--font-body); }
  .stack { display: grid; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--ink-3); width: 80px; }
  .specimen { font-family: var(--font-display); color: var(--pitch); line-height: 1; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="label">Display</span><span class="specimen" style="font-size:56px">BRACKET 26</span></div>
    <div class="row"><span class="label">H1</span><span class="specimen" style="font-size:30px; color: var(--ink)">Round of 32</span></div>
    <div class="row"><span class="label">Score</span><span class="specimen" style="font-size:24px; color: var(--ink)">BRA 3 – 1 ARG</span></div>
  </div>
</body>
</html>
