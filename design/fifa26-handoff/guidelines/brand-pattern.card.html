<!-- @dsCard group="Brand" viewport="700x220" name="Official 26 pattern" subtitle="Background asset — use behind hero blocks" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--paper); font-family: var(--font-body); }
  .hero {
    position: relative;
    height: 220px;
    background: url("../assets/brand-26-pattern.avif") center/cover;
    overflow: hidden;
  }
  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,0.55) 100%);
  }
  .copy {
    position: absolute; left: 24px; bottom: 22px; right: 24px; color: #fff;
  }
  .eyebrow { font: var(--type-caption); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--gold); }
  .h1 { font: var(--weight-black) 30px/1.05 var(--font-display); margin-top: 4px; }
</style>
</head>
<body>
  <div class="hero">
    <div class="scrim"></div>
    <div class="copy">
      <div class="eyebrow">June 11 — Kickoff</div>
      <div class="h1">48 Teams. One Bracket.</div>
    </div>
  </div>
</body>
</html>
