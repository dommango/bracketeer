<!-- @dsCard group="Brand" viewport="700x180" name="Country flags" subtitle="Real SVG flags via flagcdn.com — substitute self-hosted SVGs for offline builds" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--paper); font-family: var(--font-body); color: var(--ink); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .pair { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .code { font: var(--type-mono); font-size: 10px; color: var(--ink-3); }
  img { border-radius: 3px; background: var(--surface-sunk); box-shadow: inset 0 0 0 1px rgba(10,15,13,0.08); object-fit: cover; }
  .label { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--ink-3); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Rect · 28×21</div>
  <div class="row">
    <div class="pair"><img src="https://flagcdn.com/mx.svg" width="28" height="21" /><span class="code">MEX</span></div>
    <div class="pair"><img src="https://flagcdn.com/br.svg" width="28" height="21" /><span class="code">BRA</span></div>
    <div class="pair"><img src="https://flagcdn.com/us.svg" width="28" height="21" /><span class="code">USA</span></div>
    <div class="pair"><img src="https://flagcdn.com/de.svg" width="28" height="21" /><span class="code">GER</span></div>
    <div class="pair"><img src="https://flagcdn.com/fr.svg" width="28" height="21" /><span class="code">FRA</span></div>
    <div class="pair"><img src="https://flagcdn.com/ar.svg" width="28" height="21" /><span class="code">ARG</span></div>
    <div class="pair"><img src="https://flagcdn.com/gb-eng.svg" width="28" height="21" /><span class="code">ENG</span></div>
    <div class="pair"><img src="https://flagcdn.com/jp.svg" width="28" height="21" /><span class="code">JPN</span></div>
    <div class="pair"><img src="https://flagcdn.com/sn.svg" width="28" height="21" /><span class="code">SEN</span></div>
    <div class="pair"><img src="https://flagcdn.com/nl.svg" width="28" height="21" /><span class="code">NED</span></div>
    <div class="pair"><img src="https://flagcdn.com/es.svg" width="28" height="21" /><span class="code">ESP</span></div>
    <div class="pair"><img src="https://flagcdn.com/pt.svg" width="28" height="21" /><span class="code">POR</span></div>
    <div class="pair"><img src="https://flagcdn.com/ma.svg" width="28" height="21" /><span class="code">MAR</span></div>
    <div class="pair"><img src="https://flagcdn.com/ca.svg" width="28" height="21" /><span class="code">CAN</span></div>
  </div>
  <div class="label" style="margin-top: 14px">Circle · 28</div>
  <div class="row">
    <img src="https://flagcdn.com/mx.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/br.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/us.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/de.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/fr.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/ar.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/gb-eng.svg" width="28" height="28" style="border-radius: 50%" />
    <img src="https://flagcdn.com/jp.svg" width="28" height="28" style="border-radius: 50%" />
  </div>
</body>
</html>
