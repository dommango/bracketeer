<!-- @dsCard group="Colors" viewport="700x200" name="Host-city palette" subtitle="16 official FIFA 26 host-city accent colors" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--paper); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; color: #fff;
        font: var(--type-caption); text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background: var(--city-atlanta)">ATL</div>
    <div class="sw" style="background: var(--city-boston)">BOS</div>
    <div class="sw" style="background: var(--city-dallas); color: var(--pitch-deep); text-shadow: none">DAL</div>
    <div class="sw" style="background: var(--city-guadalajara)">GDL</div>
    <div class="sw" style="background: var(--city-houston)">HOU</div>
    <div class="sw" style="background: var(--city-kansas-city)">KC</div>
    <div class="sw" style="background: var(--city-los-angeles)">LA</div>
    <div class="sw" style="background: var(--city-mexico-city)">MEX</div>
    <div class="sw" style="background: var(--city-miami)">MIA</div>
    <div class="sw" style="background: var(--city-monterrey)">MTY</div>
    <div class="sw" style="background: var(--city-new-york-nj)">NYC</div>
    <div class="sw" style="background: var(--city-philadelphia)">PHI</div>
    <div class="sw" style="background: var(--city-san-francisco)">SF</div>
    <div class="sw" style="background: var(--city-seattle); color: var(--pitch-deep); text-shadow: none">SEA</div>
    <div class="sw" style="background: var(--city-toronto); color: var(--pitch-deep); text-shadow: none">TOR</div>
    <div class="sw" style="background: var(--city-vancouver)">VAN</div>
  </div>
</body>
</html>
